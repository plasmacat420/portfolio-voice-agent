services:
  # Single service — FastAPI + LiveKit agent worker in one process
  - type: web
    name: portfolio-voice-agent-api
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: OWNER_EMAIL
        value: prepreater1@gmail.com
      - key: FROM_EMAIL
        value: prepreater1@gmail.com
      - key: FRONTEND_URL
        value: https://plasmacat420.github.io
